services:
  postgres:
    image: postgres:17-alpine
    container_name: tiku-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tiku_dev}
      POSTGRES_USER: ${POSTGRES_USER:-tiku}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tiku_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tiku} -d ${POSTGRES_DB:-tiku_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
